<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrew Agent</title>
    <style>
        :root {
            --bg: #ffffff;
            --sidebar-bg: #fcfcfc;
            --text: #000000;
            --text-secondary: #707070;
            --primary: #000000;
            --border: #f0f0f0;
            --accent-soft: #f5f5f5;
            --code-bg: #f8f8f8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        aside {
            width: 240px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2.5rem 1rem;
        }

        .logo {
            font-weight: 800; font-size: 1rem; color: var(--text);
            margin-bottom: 2.5rem; padding: 0 0.5rem;
            letter-spacing: 0.05em; text-transform: uppercase;
        }

        nav { display: flex; flex-direction: column; gap: 4px; }
        .nav-item {
            padding: 0.6rem 0.8rem; border-radius: 4px;
            color: var(--text-secondary); text-decoration: none;
            font-weight: 500; font-size: 0.9rem; cursor: pointer;
        }
        .nav-item:hover { background: #f0f0f0; color: var(--text); }
        .nav-item.active { background: var(--accent-soft); color: var(--text); }

        main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .tab-content { display: none; flex: 1; height: 100%; overflow: hidden; }
        .tab-content.active { display: flex; flex-direction: column; }

        #chat-container {
            flex: 1; overflow-y: auto;
            padding: 4rem 15% 12rem 15%;
            scroll-behavior: smooth;
        }

        .message { margin-bottom: 3.5rem; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .role-label {
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
            color: var(--text-secondary); margin-bottom: 1rem; letter-spacing: 0.1em;
        }

        .content { 
            font-size: 0.95rem; line-height: 1.7; 
            word-break: break-word; color: #111111;
        }

        .content h1, .content h2, .content h3 { margin: 1.5rem 0 1rem 0; font-weight: 800; line-height: 1.2; }
        .content b { font-weight: 700; }
        .content code { 
            background: var(--code-bg); 
            padding: 0.1rem 0.3rem; 
            border-radius: 3px; 
            font-family: monospace; 
            font-size: 0.9em;
        }
        .content ul, .content ol { margin: 1rem 0; padding-left: 1.5rem; }
        .content li { margin-bottom: 0.5rem; }
        .content p { margin-bottom: 1rem; }

        .thought-block {
            background: #fafafa; border: 1px solid var(--border);
            padding: 1.25rem; margin: 1.25rem 0; font-size: 0.9rem;
            color: var(--text-secondary); border-radius: 2px;
            white-space: pre-wrap;
        }

        .action-block {
            background: #000000; color: #ffffff; padding: 1rem;
            border-radius: 2px; margin: 1.5rem 0;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
            white-space: pre-wrap;
        }

        .file-block {
            background: #fdfdfd; border: 1px solid var(--border);
            color: var(--text); padding: 0.75rem 1rem;
            border-radius: 4px; margin: 1rem 0;
            font-family: 'Inter', sans-serif; font-size: 0.85rem;
            font-weight: 500; display: flex; align-items: center; gap: 0.5rem;
        }

        .output-block {
            background: #ffffff; border: 1px solid var(--border);
            padding: 1rem; border-radius: 2px; margin: 0.5rem 0;
            font-family: monospace; white-space: pre-wrap;
            font-size: 0.8rem; color: var(--text-secondary);
            max-height: 400px; overflow-y: auto;
        }

        .input-area {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 2rem 15% 4rem 15%;
            background: linear-gradient(to top, white 80%, rgba(255,255,255,0));
        }

        .input-wrapper {
            background: white; border: 1px solid #e0e0e0;
            border-radius: 4px; padding: 0.6rem 0.8rem;
            display: flex; align-items: flex-end;
        }
        .input-wrapper:focus-within { border-color: #000000; }

        textarea {
            flex: 1; border: none; outline: none; padding: 0.5rem;
            font-size: 0.95rem; font-family: inherit; resize: none;
            max-height: 200px; background: transparent;
        }

        #send-btn { background: transparent; color: #000000; border: none; padding: 0.5rem; cursor: pointer; opacity: 0.8; }

        .typing { display: flex; gap: 6px; margin-top: 10px; }
        .dot { width: 3px; height: 3px; background: #000000; border-radius: 50%; animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

    </style>
</head>
<body>
    <aside>
        <div class="logo">SHREW</div>
        <nav>
            <div class="nav-item active" data-tab="home">Home</div>
            <div id="session-list" style="margin-left: 1rem; margin-bottom: 1rem; font-size: 0.8rem; overflow-y: auto; max-height: 200px; display: flex; flex-direction: column; gap: 5px;">
                <!-- Sessions will be loaded here -->
            </div>
            <div class="nav-item" id="new-chat-btn" style="border: 1px dashed var(--border); text-align: center; margin-bottom: 1rem;">+ New Chat</div>
            
            <div class="nav-item" data-tab="skills">Skills</div>
            <div class="nav-item" data-tab="vault">Vault</div>
        </nav>
    </aside>

    <main>
        <div id="home" class="tab-content active">
            <div id="chat-container"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Message Shrew" rows="1"></textarea>
                    <button id="send-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="skills" class="tab-content">
            <div style="padding: 4rem 15%;">
                <h2>Learned Skills</h2>
                <div id="skills-list" style="margin-top: 2rem; display: flex; flex-direction: column; gap: 10px;">
                    <!-- Skills will be loaded here -->
                </div>
                <p style="margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
                    To teach Shrew a new skill, go to Home and ask it to learn a specific API (e.g., "Learn the Twitter API documentation").
                </p>
            </div>
        </div>
        <div id="vault" class="tab-content">
            <div style="padding: 4rem 15%;">
                <h2>Vault</h2>
                <div style="margin-top: 2rem; background: var(--accent-soft); padding: 1.5rem; border-radius: 4px;">
                    <h3>Add Secret</h3>
                    <div style="display: flex; gap: 10px; margin-top: 1rem;">
                        <input type="text" id="vault-key" placeholder="Key (e.g. STRIPE_KEY)" style="flex: 1; padding: 0.5rem; border: 1px solid var(--border);">
                        <input type="password" id="vault-val" placeholder="Value" style="flex: 1; padding: 0.5rem; border: 1px solid var(--border);">
                        <button id="add-vault-btn" style="padding: 0.5rem 1rem; background: black; color: white; border: none; cursor: pointer;">Add</button>
                    </div>
                </div>
                <div id="vault-list" style="margin-top: 2rem;">
                    <!-- Secrets will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sessionList = document.getElementById('session-list');
        const vaultList = document.getElementById('vault-list');
        const skillsList = document.getElementById('skills-list');

        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.id === 'new-chat-btn') return;
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item, .tab-content').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                if (item.dataset.tab) {
                    document.getElementById(item.dataset.tab).classList.add('active');
                    if (item.dataset.tab === 'vault') loadVault();
                    if (item.dataset.tab === 'skills') loadSkills();
                    if (item.dataset.tab === 'home') loadSessions();
                }
            });
        });

        // Sessions logic
        async function loadSessions() {
            const res = await fetch('/sessions');
            const sessions = await res.json();
            sessionList.innerHTML = '';
            sessions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach(s => {
                const div = document.createElement('div');
                div.className = 'session-item';
                div.style = 'padding: 4px; cursor: pointer; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;';
                div.textContent = s.id;
                div.onclick = () => loadSession(s.id);
                sessionList.appendChild(div);
            });
        }

        async function loadSession(id) {
            const res = await fetch(`/session?id=${id}`);
            const sess = await res.json();
            chatContainer.innerHTML = '';
            sess.messages.forEach(m => {
                if (m.content.startsWith('Context: ')) return;
                appendMessage(m.role, m.content);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        document.getElementById('new-chat-btn').onclick = async () => {
            await fetch('/session/new', { method: 'POST' });
            chatContainer.innerHTML = '';
            loadSessions();
        };

        // Vault logic
        async function loadVault() {
            const res = await fetch('/vault');
            const secrets = await res.json();
            vaultList.innerHTML = '<table style="width: 100%; text-align: left; border-collapse: collapse;">' +
                '<tr style="border-bottom: 1px solid var(--border);"><th style="padding: 10px;">Key</th><th style="padding: 10px;">Value</th><th style="padding: 10px;">Action</th></tr>' +
                Object.entries(secrets).map(([k, v]) => `
                    <tr style="border-bottom: 1px solid var(--border);">
                        <td style="padding: 10px;">${k}</td>
                        <td style="padding: 10px;">••••••••</td>
                        <td style="padding: 10px;"><button onclick="deleteSecret('${k}')" style="color: red; background: none; border: none; cursor: pointer;">Delete</button></td>
                    </tr>
                `).join('') + '</table>';
        }

        async function deleteSecret(key) {
            await fetch(`/vault?key=${key}`, { method: 'DELETE' });
            loadVault();
        }

        document.getElementById('add-vault-btn').onclick = async () => {
            const key = document.getElementById('vault-key').value;
            const value = document.getElementById('vault-val').value;
            if (!key || !value) return;
            await fetch('/vault', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key, value })
            });
            document.getElementById('vault-key').value = '';
            document.getElementById('vault-val').value = '';
            loadVault();
        };

        // Skills logic
        async function loadSkills() {
            const res = await fetch('/skills');
            const skills = await res.json();
            skillsList.innerHTML = skills.map(s => `
                <div style="padding: 1rem; border: 1px solid var(--border); border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
                    <strong>${s}</strong>
                    <span style="font-size: 0.8rem; color: green;">Active</span>
                </div>
            `).join('') || '<p>No skills learned yet.</p>';
        }

        loadSessions();

        const events = new EventSource('/events');
        let currentAiMessage = null;

        events.onmessage = (event) => {
            const data = JSON.parse(event.data);
            handleEvent(data);
        };

        function handleEvent(event) {
            removeTypingIndicator();
            if (event.type === 'user_message') {
                appendMessage('user', event.content);
                currentAiMessage = null;
            } else if (event.type === 'thinking') {
                if (!currentAiMessage) currentAiMessage = appendMessage('assistant', '');
                showTypingIndicator();
            } else if (event.type === 'response') {
                if (!currentAiMessage) currentAiMessage = appendMessage('assistant', '');
                updateAiMessage(currentAiMessage, event.content);
                
                // Reset context if we triggered an action
                if (event.content.includes('</run>') || event.content.includes('</read>') || event.content.includes('</write>')) {
                    currentAiMessage = null;
                }
            } else if (event.type === 'executing') {
                appendAction('executing', event.content);
            } else if (event.type === 'file_op') {
                appendAction('file_op', event.content);
            } else if (event.type === 'output') {
                appendAction('output', event.content);
            } else if (event.type === 'error') {
                appendMessage('system', event.content);
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message role-${role}`;
            div.innerHTML = `<div class="role-label">${role === 'user' ? 'YOU' : 'SHREW'}</div><div class="content"></div>`;
            const contentEl = div.querySelector('.content');
            contentEl.innerHTML = renderMarkdown(content);
            chatContainer.appendChild(div);
            return div;
        }

        function updateAiMessage(element, content) {
            const contentDiv = element.querySelector('.content');
            
            const thinkMatch = content.match(/<think>([\s\S]*?)<\/think>/);
            if (thinkMatch) {
                let existingThought = element.querySelector('.thought-block');
                if (!existingThought) {
                    existingThought = document.createElement('div');
                    existingThought.className = 'thought-block';
                    element.insertBefore(existingThought, contentDiv);
                }
                existingThought.textContent = thinkMatch[1].trim();
            }

            let mainContent = content;
            if (content.includes('</think>')) {
                mainContent = content.split('</think>')[1];
            }
            
            // Clean all possible action tags
            mainContent = mainContent
                .replace(/<run>[\s\S]*?<\/run>/g, '')
                .replace(/<read>[\s\S]*?<\/read>/g, '')
                .replace(/<write>[\s\S]*?<\/write>/g, '')
                .trim();
            
            contentDiv.innerHTML = renderMarkdown(mainContent);
        }

        function renderMarkdown(text) {
            if (!text) return '';
            let html = text
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/^\s*[-*+]\s+(.*)$/gm, '<li>$1</li>')
                .replace(/^\d+\.\s+(.*)$/gm, '<li>$1</li>');

            html = html.replace(/(<li>.*<\/li>(\n<li>.*<\/li>)*)/g, '<ul>$1</ul>');
            const paragraphs = html.split(/\n\s*\n/);
            return paragraphs.map(p => {
                if (p.startsWith('<h') || p.startsWith('<ul')) return p;
                return `<p>${p.replace(/\n/g, '<br>')}</p>`;
            }).join('');
        }

        function appendAction(type, content) {
            const div = document.createElement('div');
            div.className = type === 'executing' ? 'action-block' : (type === 'file_op' ? 'file-block' : 'output-block');
            
            if (type === 'file_op') {
                div.innerHTML = `<span>&#128196;</span> ${content}`;
            } else {
                div.textContent = type === 'executing' ? '> ' + content : content;
            }
            
            chatContainer.appendChild(div);
            return div;
        }

        function showTypingIndicator() {
            if (document.querySelector('.typing')) return;
            const div = document.createElement('div');
            div.className = 'typing';
            div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatContainer.appendChild(div);
        }

        function removeTypingIndicator() {
            const indicator = document.querySelector('.typing');
            if (indicator) indicator.remove();
        }

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            userInput.value = ''; userInput.style.height = 'auto';
            await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); sendMessage();
            }
        });
    </script>
</body>
</html>
